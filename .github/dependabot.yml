version: 2
updates:
  # Application dependencies.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk dev tooling updates into one PR to cut noise.
      dev-dependencies:
        dependency-type: "development"
    labels:
      - "dependencies"

  # Keep the GitHub Actions used in CI up to date too.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
